name: Update Asset Manifest

on:
  push:
    branches:
      - main
    paths:
      - "app/public/assets/**"
      - ".github/workflows/update_asset_manifest.sh"
      - ".github/workflows/update_asset_manifest.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-asset-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: bash .github/workflows/update_asset_manifest.sh

      - name: Commit updated manifest
        run: |
          if git diff --quiet -- app/src/app_x/config/local_asset_names.ts; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/app_x/config/local_asset_names.ts
          git commit -m "Update asset manifest"
          git push
